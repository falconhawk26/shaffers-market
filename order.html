<!DOCTYPE html>
<html>
<head>
  <title>Order Online - Shaffer's Market</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-text">Shaffer's Market</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="departments.html">Departments</a>
      <a href="specials.html">Weekly Specials</a>
      <a href="order.html">Order Online</a>
      <a href="visit.html">Visit Us</a>
      <a href="contact.html">Contact</a>
    </nav>
  </div>
</header>

<div class="hero">
  <img src="storefront.jpeg" alt="Storefront">
</div>

<div class="container">
  <h2>Order Online</h2>

  <p style="color:red; font-weight:bold;">
    Online ordering is not active yet. Please call the store to place orders.
  </p>

  <form action="" method="POST" onsubmit="return false;">
    <div class="card">
      <h3>Customer Information</h3>
      <label>Name</label>
      <input type="text">
      <label>Phone</label>
      <input type="text">
      <label>Email</label>
      <input type="email">
    </div>

    <div class="card">
      <h3>Pickup Time</h3>
      <select>
        <option>As soon as ready</option>
        <option>10 AM – 12 PM</option>
        <option>12 PM – 2 PM</option>
        <option>2 PM – 4 PM</option>
        <option>4 PM – 6 PM</option>
      </select>
    </div>

    <h2>Your Items</h2>
    <div id="items-container"></div>
    <button type="button" onclick="addItemRow()">Add Item</button>

    <div class="card">
      <h3>Special Instructions</h3>
      <textarea rows="5"></textarea>
    </div>

    <button type="submit">Submit Order</button>
  </form>
</div>

<script>
  const menu = {
    "Produce": ["Apples", "Bananas", "Lettuce"],
    "Meat": ["Ground Beef", "Steaks"],
    "Deli": ["Ham", "Swiss Cheese"]
  };

  function updateItems(sel) {
    const cat = sel.value;
    const itemSel = sel.parentElement.querySelector(".item-select");
    itemSel.innerHTML = "";
    if (!menu[cat]) return;
    menu[cat].forEach(i => {
      const o = document.createElement("option");
      o.textContent = i;
      itemSel.appendChild(o);
    });
  }

  function addItemRow() {
    const c = document.getElementById("items-container");
    const r = document.createElement("div");
    r.className = "card";
    r.innerHTML = `
      <label>Category</label>
      <select class="category-select" onchange="updateItems(this)">
        <option value="">Select</option>
        <option>Produce</option>
        <option>Meat</option>
        <option>Deli</option>
      </select>

      <label>Item</label>
      <select class="item-select"></select>

      <label>Quantity</label>
      <input type="number" min="1">
    `;
    c.appendChild(r);
  }

  window.onload = addItemRow;
</script>

</body>
</html>
