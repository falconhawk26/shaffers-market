<!DOCTYPE html>
<html>
<head>
  <title>Order Online - Shaffer's Market</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
<header>
  <div class="header-inner">
    <div class="logo-text">Shaffer's Market</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="departments.html">Departments</a>
      <a href="specials.html">Weekly Specials</a>
      <a href="order.html">Order Online</a>
      <a href="visit.html">Visit Us</a>
      <a href="contact.html">Contact</a>
    </nav>
  </div>
</header>

<div class="hero">
  <img src="storefront.jpg" alt="Shaffer's Market storefront">
</div>

<div class="container">

  <p style="color:red; font-weight:bold;">
    Online ordering is not active yet.
  </p>

  <form action="" method="POST" onsubmit="return false;">
    <div class="card">
      <h3>Customer Information</h3>
      <label>Name</label>
      <input type="text" required>
      <label>Phone</label>
      <input type="text" required>
    </div>

    <div class="card">
      <h3>Pickup Details</h3>
      <label>Pickup Time</label>
      <select required>
        <option>As soon as ready</option>
      </select>
    </div>

    <h2>Your Items</h2>
    <div id="items-container"></div>
    <button type="button" onclick="addItemRow()">Add Item</button>

    <button type="submit">Submit Order</button>
  </form>
</div>

<footer>
  <div class="footer-content">
    <div class="footer-section">
      <h4>Shaffer's Market</h4>
      <p>8 W Turkeyfoot Lake Rd<br>Akron, OH 44319</p>
    </div>
  </div>
</footer>

<script>
  const menu = {
    "Produce": ["Apples","Bananas","Lettuce"],
    "Meat & Poultry": ["Ground Beef","Steaks"],
    "Deli": ["Sliced Ham","Swiss Cheese"]
  };

  function updateItems(sel) {
    const cat = sel.value;
    const itemSel = sel.parentElement.querySelector(".item-select");
    itemSel.innerHTML = "";
    menu[cat].forEach(i => {
      const o = document.createElement("option");
      o.textContent = i;
      itemSel.appendChild(o);
    });
  }

  function addItemRow() {
    const c = document.getElementById("items-container");
    const r = document.createElement("div");
    r.className = "card";
    r.innerHTML = `
      <label>Category</label>
      <select class="category-select" onchange="updateItems(this)">
        <option value="">Select</option>
        <option>Produce</option>
        <option>Meat & Poultry</option>
        <option>Deli</option>
      </select>

      <label>Item</label>
      <select class="item-select"></select>

      <label>Quantity</label>
      <input type="number" min="1">
    `;
    c.appendChild(r);
  }

  window.onload = addItemRow;
</script>

</body>
</html>
