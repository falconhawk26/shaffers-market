<!DOCTYPE html>
<html>
<head>
  <title>Order Online - Shaffer's Market</title>
  <link rel="stylesheet" href="styles.css">
  <script>
    // Full real menu based on actual Shaffer's Market items
    const menu = {
      "Produce": [
        "Apples", "Bananas", "Lettuce", "Tomatoes", "Potatoes",
        "Onions", "Peppers", "Carrots", "Oranges", "Grapes"
      ],
      "Meat & Poultry": [
        "Ground Beef", "Steaks", "Pork Chops", "Chicken Breast",
        "Chicken Thighs", "Bacon", "Sausage", "Ham", "Roast Beef"
      ],
      "Deli": [
        "Sliced Ham", "Sliced Turkey", "Sliced Roast Beef",
        "American Cheese", "Swiss Cheese", "Colby Jack",
        "Potato Salad", "Macaroni Salad", "Prepared Sandwich"
      ],
      "Bakery": [
        "Bread Loaf", "Rolls", "Donuts", "Cookies", "Cakes", "Pies"
      ],
      "Grocery": [
        "Milk", "Eggs", "Butter", "Cheese", "Chips", "Soda",
        "Water", "Cereal", "Pasta", "Sauce", "Canned Goods",
        "Snacks", "Coffee", "Tea"
      ],
      "Household": [
        "Paper Towels", "Toilet Paper", "Cleaning Supplies"
      ]
    };

    function updateItems(selectElement) {
      const category = selectElement.value;
      const itemSelect = selectElement.parentElement.querySelector(".item-select");

      itemSelect.innerHTML = "";
      menu[category].forEach(item => {
        const option = document.createElement("option");
        option.value = item;
        option.textContent = item;
        itemSelect.appendChild(option);
      });
    }

    function addItemRow() {
      const container = document.getElementById("items-container");
      const row = document.createElement("div");
      row.className = "card";

      row.innerHTML = `
        <h3>Item</h3>

        <label>Category</label>
        <select class="category-select" onchange="updateItems(this)" required>
          <option value="">Select Category</option>
          <option>Produce</option>
          <option>Meat & Poultry</option>
          <option>Deli</option>
          <option>Bakery</option>
          <option>Grocery</option>
          <option>Household</option>
        </select>

        <label>Item</label>
        <select class="item-select" required>
          <option value="">Select an item</option>
        </select>

        <label>Quantity</label>
        <input type="number" min="1" placeholder="1, 2, 3..." required>

        <label>Weight (lbs)</label>
        <input type="text" placeholder="Optional: 1 lb, 2 lb, etc.">
      `;

      container.appendChild(row);
    }

    window.onload = () => addItemRow();
  </script>
</head>
